---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-5.0.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ganymede
spec:
  releaseName: *app
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  maxHistory: 2
  install:
    remediation:
      retries: 3
  rollback:
    cleanupOnFail: true
  upgrade:
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      ganymede:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom: &envFrom
              - secretRef:
                  name: ganymede-secret
        containers:
          app:
            image:
              repository: ghcr.io/zibbp/ganymede
              tag: 4.18.0@sha256:da1030c09d516656e6d983cf4da792f5203b591cc30d7c8f9d9e3e5ad3893774
            env:
              TZ: America/Chicago
              PUID: 568
              PGID: 568
              MAX_CHAT_DOWNLOAD_EXECUTIONS: 1
              MAX_CHAT_RENDER_EXECUTIONS: 1
              MAX_VIDEO_DOWNLOAD_EXECUTIONS: 1
              MAX_VIDEO_CONVERT_EXECUTIONS: 1
              MAX_VIDEO_SPRITE_THUMBNAIL_EXECUTIONS: 1
              VIDEOS_DIR: /media/library/streams
              TEMP_DIR: /media/library/streams/tmp
            envFrom: *envFrom
            resources:
              requests:
                cpu: 100m
                memory: 4Gi
              limits:
                memory: 8Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 4000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: ganymede
          gethomepage.dev/icon: twitch.svg
          gethomepage.dev/description: Twitch stream archiver
        hostnames: ["ganymede.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /data/config
      logs:
        type: emptyDir
        globalMounts:
          - path: /data/logs
      media:
        type: nfs
        server: "192.168.10.42"
        path: /mnt/data/media
        globalMounts:
          - path: /media
