---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.4
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operatorConfig:
      namespace: rook-ceph
      driverSpecDefaults:
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        enableMetadata: false
        generateOMapInfo: false
        fsGroupPolicy: File
        deployCsiAddons: false
        cephFsClientType: kernel
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical
          imagePullPolicy: IfNotPresent
        controllerPlugin:
          hostNetwork: true
          deploymentStrategy:
            type: Recreate
          replicas: 2
          priorityClassName: system-cluster-critical
          imagePullPolicy: IfNotPresent
    drivers:
      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        enableMetadata: false
        generateOMapInfo: false
        fsGroupPolicy: File
        deployCsiAddons: false
        cephFsClientType: kernel
        snapshotPolicy: volumeSnapshot
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical
        controllerPlugin:
          replicas: 2
          priorityClassName: system-cluster-critical
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        enableMetadata: false
        generateOMapInfo: false
        fsGroupPolicy: File
        deployCsiAddons: false
        cephFsClientType: kernel
        snapshotPolicy: volumeGroupSnapshot
        kernelMountOptions:
          ms_mode: prefer-crc
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical
        controllerPlugin:
          replicas: 2
          priorityClassName: system-cluster-critical
      nfs:
        enabled: false
      nvmeof:
        enabled: false
